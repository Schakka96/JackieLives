<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Jackie Voice Tagger</title>
<style>
  :root{
    --bg:#0b0d10; --panel:#14181d; --panel2:#1b2026; --line:#2a313a;
    --txt:#e8edf2; --dim:#8a97a6; --acc:#ffe14d; --acc2:#00e0c6; --bad:#ff5d6c;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);
    font:15px/1.45 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    -webkit-text-size-adjust:100%}
  header{position:sticky;top:0;z-index:5;background:linear-gradient(#0b0d10,#0b0d10ee);
    border-bottom:1px solid var(--line);padding:10px 12px}
  h1{margin:0 0 8px;font-size:17px;letter-spacing:.5px}
  h1 span{color:var(--acc)}
  .bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .bar input[type=search]{flex:1 1 140px;min-width:120px}
  .new-badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:999px;
    background:#ff9d2b;color:#2a1800;vertical-align:middle;margin-left:6px}
  .mem-badge{font-size:10px;font-weight:700;letter-spacing:.6px;padding:2px 7px;border-radius:999px;
    background:#9d6bff;color:#160029;vertical-align:middle;margin-left:6px}
  .vg{font-size:10px;font-weight:700;padding:2px 6px;border-radius:999px;vertical-align:middle;margin-left:6px}
  .vg.male{background:#2b6bff;color:#fff} .vg.female{background:#ff4d9d;color:#2a001a}
  .tx-edit{width:100%;font-size:15px;font-family:inherit;background:var(--panel2);
    border:1px solid var(--acc);border-radius:8px;padding:6px 8px;resize:vertical;min-height:36px;
    color:var(--txt)}
  input,select,textarea,button{font:inherit;color:var(--txt);background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:7px 9px}
  textarea{width:100%;resize:vertical;min-height:42px}
  button{cursor:pointer;background:var(--panel2)}
  button.acc{background:var(--acc);color:#1a1a1a;border-color:var(--acc);font-weight:600}
  button.ghost{background:transparent}
  .prog{font-size:12px;color:var(--dim)}
  .prog b{color:var(--acc2)}
  main{padding:10px 12px 60px;max-width:720px;margin:0 auto}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;
    padding:12px;margin:0 0 12px}
  .card.done{border-color:var(--acc2)}
  .tx{font-size:15px;margin:0 0 8px}
  .meta{font-size:12px;color:var(--dim);margin:0 0 8px}
  audio{width:100%;margin:0 0 10px;filter:saturate(.6) brightness(.95)}
  .noaudio{font-size:12px;color:var(--dim);font-style:italic;margin:0 0 10px}
  label.fld{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--dim);margin:10px 0 4px}
  .row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .chips{display:flex;gap:6px;flex-wrap:wrap}
  .chip{padding:5px 10px;border:1px solid var(--line);border-radius:999px;font-size:13px;
    background:var(--panel2);cursor:pointer;user-select:none}
  .chip.on{background:var(--acc2);color:#04201d;border-color:var(--acc2)}
  .chip.mood.on{background:var(--acc);color:#241f00;border-color:var(--acc)}
  .chip.never.on{background:var(--bad);color:#2a0307;border-color:var(--bad)}
  button.bad{background:var(--bad);color:#2a0307;border-color:var(--bad);font-weight:600}
  .tchip{padding:4px 8px;border-radius:999px;background:#26303a;font-size:12px}
  .tchip b{cursor:pointer;color:var(--bad);margin-left:6px}
  .slider{display:flex;gap:10px;align-items:center}
  .slider input{flex:1}
  .pct{min-width:42px;text-align:right;color:var(--acc)}
  select.cat{width:100%}
  .addtrig{display:flex;gap:6px;margin-top:6px}
  .addtrig input{flex:1}
  footer{position:fixed;bottom:0;left:0;right:0;background:#0b0d10ee;border-top:1px solid var(--line);
    padding:8px 12px;display:flex;gap:8px;justify-content:center}
  .hidden{display:none}
  .tiny{font-size:11px;color:var(--dim)}
</style>
</head>
<body>
<header>
  <h1><span>JACKIE</span> · Voice-line Tagger</h1>
  <div class="bar">
    <input id="search" type="search" placeholder="search transcript…">
    <select id="fcat"><option value="">all categories</option></select>
    <label class="tiny"><input type="checkbox" id="funtag"> untagged only</label>
    <label class="tiny"><input type="checkbox" id="fnew"> new lines only</label>
    <select id="fgender" class="tiny"><option value="">V: any</option><option value="female">V: female</option><option value="male">V: male</option></select>
    <label class="tiny"><input type="checkbox" id="fmem"> memorial only</label>
  </div>
  <div class="bar" style="margin-top:8px">
    <button class="ghost" id="import">Import lines.json</button>
    <button class="ghost" id="export">Export tags</button>
    <button class="ghost" id="next">Next untagged ↓</button>
    <span class="prog" id="prog"></span>
  </div>
  <input id="file" type="file" accept="application/json" class="hidden">
</header>
<main id="list"></main>
<footer>
  <span class="tiny">Auto-saves to this device. Export regularly to back up your tags.</span>
</footer>

<script>
"use strict";
const CATS = ["greetings","conversation","environmental","combat","idle","emotional","banter","romance","memorial"];
const BASE_MOODS = ["chill","warm","excited","worried","somber","flirty","gruff","hyped","proud","teasing"];
const LOCS = ["noodle","coyote","afterlife","mamas","misty","vik","lizzie","delamain","combat","anywhere","never"];
const LS_KEY = "jackie_voice_tags_v1";
const LS_MOODS = "jackie_custom_moods_v1";

// MOODS = base list + any custom moods you've added (persisted on this device).
let MOODS = BASE_MOODS.slice();
function loadMoods(){
  try { const extra = JSON.parse(localStorage.getItem(LS_MOODS)) || [];
        MOODS = BASE_MOODS.concat(extra.filter(m=>!BASE_MOODS.includes(m))); }
  catch(e){ MOODS = BASE_MOODS.slice(); }
}
function addMood(name){
  const m=String(name||"").trim().toLowerCase();
  if(!m || MOODS.includes(m)) return false;
  MOODS.push(m);
  const extra=MOODS.filter(x=>!BASE_MOODS.includes(x));
  localStorage.setItem(LS_MOODS, JSON.stringify(extra));
  return true;
}

// Minimal sample so the app is never empty. Replace by importing your own lines.json
// (format: [{ "id":"l001", "file":"audio/l001.wav"|null, "transcript":"...", "category":"" }, ...]).
const SAMPLE = [
  {id:"s1", file:null, transcript:"¡Preem! Knew you'd come 'round, hermana.", category:"greetings"},
  {id:"s2", file:null, transcript:"Let's get a drink. On me, choom.", category:"banter"},
  {id:"s3", file:null, transcript:"Stay frosty out there.", category:"idle"},
  {id:"s4", file:null, transcript:"You good? Talk to me.", category:"emotional"},
  {id:"s5", file:null, transcript:"Behind you — move!", category:"combat"},
];

let LINES = [];
let TAGS = {};

function load(){
  try { TAGS = JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch(e){ TAGS = {}; }
  loadMoods();
  // try to fetch a colocated lines.json (works when served over http); fall back to sample
  fetch("lines.json").then(r=>r.ok?r.json():Promise.reject()).then(j=>{
    LINES = normalize(j); render();
  }).catch(()=>{ LINES = normalize(SAMPLE); render(); });
}
function normalize(arr){
  // keep every field from lines.json (string_id, vo_wem, context… survive to export),
  // just guarantee the four the UI relies on.
  return (arr||[]).map((l,i)=>Object.assign({}, l, {
    id: String(l.id || ("line"+i)),
    file: l.file || null,
    transcript: l.transcript || "(no transcript)",
    category: l.category || ""
  }));
}
function tagFor(id){
  if(!TAGS[id]) TAGS[id] = {category:"",mood:[],triggers:[],probability:1,locations:[],notes:"",done:false};
  return TAGS[id];
}
function save(){ localStorage.setItem(LS_KEY, JSON.stringify(TAGS)); updateProg(); }
function isTagged(id){ const t=TAGS[id]; return !!(t && t.done); }
function updateProg(){
  const done = LINES.filter(l=>isTagged(l.id)).length;
  document.getElementById("prog").innerHTML = `<b>${done}</b> / ${LINES.length} tagged`;
}

function chip(label,on,cls,onclick){
  const b=document.createElement("span");
  b.className="chip"+(cls?(" "+cls):"")+(on?" on":"");
  b.textContent=label; b.onclick=onclick; return b;
}

function render(){
  const list=document.getElementById("list");
  const q=(document.getElementById("search").value||"").toLowerCase();
  const fc=document.getElementById("fcat").value;
  const untag=document.getElementById("funtag").checked;
  const fnew=document.getElementById("fnew").checked;
  const fgender=document.getElementById("fgender").value;
  const fmem=document.getElementById("fmem").checked;
  list.innerHTML="";
  LINES.forEach(l=>{
    const isNew = l.source==="new_unscraped";
    const displayTranscript = TAGS[l.id]?.transcript_edit || l.transcript || "";
    if(q && !displayTranscript.toLowerCase().includes(q) && !l.id.toLowerCase().includes(q)) return;
    const t=tagFor(l.id);
    if(fc && (t.category||l.category)!==fc) return;
    if(untag && isTagged(l.id)) return;
    if(fnew && !isNew) return;
    if(fgender && l.v_gender!==fgender) return;
    if(fmem && !l.memorial) return;
    list.appendChild(cardEl(l,t));
  });
  updateProg();
}

function cardEl(l,t){
  const c=document.createElement("div"); c.className="card"+(t.done?" done":""); c.id="card-"+l.id;

  const isNew = l.source==="new_unscraped";
  if(isNew){
    // editable transcript for lines with no scraped text
    const txLabel=fld("Transcript"); c.appendChild(txLabel);
    const txEdit=document.createElement("textarea"); txEdit.className="tx-edit";
    txEdit.placeholder="Type what you hear…";
    // seed from a manual edit if present, else the Whisper transcript baked into lines.json
    txEdit.value = (t.transcript_edit!==undefined && t.transcript_edit!=="") ? t.transcript_edit : (l.transcript||"");
    txEdit.oninput=()=>{ t.transcript_edit=txEdit.value; save(); };
    c.appendChild(txEdit);
    if(l.transcript) { const h=document.createElement("p"); h.className="tiny"; h.textContent="↑ Whisper auto-transcript — fix any errors by ear"; c.appendChild(h); }
  } else {
    const tx=document.createElement("p"); tx.className="tx"; tx.textContent=l.transcript; c.appendChild(tx);
  }
  const meta=document.createElement("p"); meta.className="meta";
  const bits=[];
  if(isNew){
    bits.push(l.id.replace("new_",""));  // show the wem stem
    if(l.quests&&l.quests.length) bits.push("q:"+l.quests.join(","));
  } else {
    bits.push("id: "+l.id);
    if(l.context&&l.context.length)    bits.push(l.context.map(x=>x.replace("Vo_Context_","")).join("/"));
    if(l.expression&&l.expression.length) bits.push(l.expression.map(x=>x.replace(/Vo_Exp\w*?_/,"")).join("/"));
    if(l.quests&&l.quests.length)      bits.push("q:"+l.quests.slice(0,2).join(","));
  }
  // badges: V-gender (always), NEW (new pool), MEMORIAL (V funeral/voicemail set)
  let badges="";
  if(l.v_gender==="male"||l.v_gender==="female") badges+=`<span class="vg ${l.v_gender}">V ${l.v_gender==="male"?"♂":"♀"}</span>`;
  if(isNew) badges+='<span class="new-badge">NEW</span>';
  if(l.memorial) badges+='<span class="mem-badge">MEMORIAL · V→Jackie</span>';
  meta.innerHTML=esc(bits.join("  ·  "))+badges;
  c.appendChild(meta);

  if(l.file){
    const a=document.createElement("audio"); a.controls=true; a.preload="none"; a.src=l.file; c.appendChild(a);
  } else {
    const n=document.createElement("p"); n.className="noaudio"; n.textContent="no audio file — tag by transcript"; c.appendChild(n);
  }

  // category
  c.appendChild(fld("Category"));
  const sel=document.createElement("select"); sel.className="cat";
  sel.appendChild(new Option("— pick —",""));
  CATS.forEach(x=>sel.appendChild(new Option(x,x)));
  sel.value=t.category||l.category||"";
  sel.onchange=()=>{ t.category=sel.value; save(); };
  c.appendChild(sel);

  // mood
  c.appendChild(fld("Mood"));
  const md=document.createElement("div"); md.className="chips";
  MOODS.forEach(m=>md.appendChild(chip(m,t.mood.includes(m),"mood",()=>toggle(t.mood,m,()=>{save();render();}))));
  c.appendChild(md);
  const ma=document.createElement("div"); ma.className="addtrig";
  const mi=document.createElement("input"); mi.placeholder="add a new mood (stays in the list)…";
  const mb=document.createElement("button"); mb.textContent="+"; mb.className="acc";
  const addM=()=>{ const v=mi.value.trim().toLowerCase(); if(!v) return;
    addMood(v); if(!t.mood.includes(v)) t.mood.push(v); mi.value=""; save(); render(); };
  mb.onclick=addM; mi.onkeydown=e=>{ if(e.key==="Enter") addM(); };
  ma.appendChild(mi); ma.appendChild(mb); c.appendChild(ma);

  // triggers
  c.appendChild(fld("Triggers (when should he say this?)"));
  const tw=document.createElement("div"); tw.className="chips";
  t.triggers.forEach((tg,i)=>{
    const e=document.createElement("span"); e.className="tchip"; e.innerHTML=esc(tg)+" <b>×</b>";
    e.querySelector("b").onclick=()=>{ t.triggers.splice(i,1); save(); render(); };
    tw.appendChild(e);
  });
  c.appendChild(tw);
  const add=document.createElement("div"); add.className="addtrig";
  const ti=document.createElement("input"); ti.placeholder="e.g. V enters bar, low health, first meet…";
  const tb=document.createElement("button"); tb.textContent="+"; tb.className="acc";
  const addT=()=>{ const v=ti.value.trim(); if(v){ t.triggers.push(v); ti.value=""; save(); render(); } };
  tb.onclick=addT; ti.onkeydown=e=>{ if(e.key==="Enter") addT(); };
  add.appendChild(ti); add.appendChild(tb); c.appendChild(add);

  // probability
  c.appendChild(fld("Play chance"));
  const sl=document.createElement("div"); sl.className="slider";
  const r=document.createElement("input"); r.type="range"; r.min=0; r.max=100; r.step=5; r.value=Math.round((t.probability??1)*100);
  const pc=document.createElement("span"); pc.className="pct"; pc.textContent=r.value+"%";
  r.oninput=()=>{ pc.textContent=r.value+"%"; t.probability=(+r.value)/100; save(); };
  sl.appendChild(r); sl.appendChild(pc); c.appendChild(sl);

  // locations
  c.appendChild(fld("Where it fits"));
  const lw=document.createElement("div"); lw.className="chips";
  LOCS.forEach(x=>lw.appendChild(chip(x,t.locations.includes(x),x==="never"?"never":null,()=>toggle(t.locations,x,()=>{
    if(x==="never" && t.locations.includes("never")) t.probability=0;  // never heard again
    save();render();
  }))));
  c.appendChild(lw);

  // notes
  c.appendChild(fld("Notes"));
  const na=document.createElement("textarea"); na.value=t.notes||""; na.placeholder="anything…";
  na.oninput=()=>{ t.notes=na.value; save(); };
  c.appendChild(na);

  // done
  const dr=document.createElement("div"); dr.className="row"; dr.style.marginTop="10px";
  const db=document.createElement("button"); db.className=t.done?"acc":"";
  db.textContent=t.done?"✓ tagged":"mark tagged";
  db.onclick=()=>{ t.done=!t.done; save(); render(); };
  dr.appendChild(db);

  // partial — for now: never play (chance 0, fit "never"); later we'll cut a snippet from this line
  const pb=document.createElement("button"); pb.className=t.partial?"bad":"ghost";
  pb.textContent=t.partial?"⚑ partial":"partial";
  pb.onclick=()=>{ t.partial=!t.partial;
    if(t.partial){ t.probability=0; if(!t.locations.includes("never")) t.locations.push("never"); }
    save(); render(); };
  dr.appendChild(pb); c.appendChild(dr);
  return c;
}

function fld(label){ const e=document.createElement("label"); e.className="fld"; e.textContent=label; return e; }
function toggle(arr,v,after){ const i=arr.indexOf(v); if(i<0)arr.push(v); else arr.splice(i,1); if(after)after(); }
function esc(s){ return String(s).replace(/[&<>"]/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[m])); }

// controls
document.getElementById("search").oninput=render;
document.getElementById("fcat").onchange=render;
document.getElementById("funtag").onchange=render;
document.getElementById("fnew").onchange=render;
document.getElementById("fgender").onchange=render;
document.getElementById("fmem").onchange=render;
CATS.forEach(x=>document.getElementById("fcat").appendChild(new Option(x,x)));

document.getElementById("next").onclick=()=>{
  const l=LINES.find(x=>!isTagged(x.id));
  if(l){ const el=document.getElementById("card-"+l.id); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }
};
document.getElementById("import").onclick=()=>document.getElementById("file").click();
document.getElementById("file").onchange=e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{ try{ LINES=normalize(JSON.parse(rd.result)); render(); }catch(err){ alert("Bad JSON: "+err.message); } };
  rd.readAsText(f);
};
document.getElementById("export").onclick=()=>{
  const out=LINES.map(l=>{
    const tag=TAGS[l.id]||{};
    const merged=Object.assign({}, l, tag);
    // bake any typed transcript into the transcript field
    if(tag.transcript_edit) merged.transcript=tag.transcript_edit;
    delete merged.transcript_edit;
    return merged;
  });
  const blob=new Blob([JSON.stringify(out,null,2)],{type:"application/json"});
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
  a.download="jackie_voice_tags.json"; a.click();
};

load();
</script>
</body>
</html>
