# TweakXL — JackieLives "force stand" restriction
# ---------------------------------------------------------------------------
# Used by the Blaze finale to STAND V up (uncrouch) during the fade-in transport.
# Loads LOOSE (no WolvenKit) once this file sits at:
#     <game>\r6\tweaks\JackieLives\jl_force_stand.yaml
#
# Why: the player's crouch state can't be forced via the PSM blackboard (it's an
# engine OUTPUT, overwritten every tick). The real switch is a status effect
# carrying the gameplay tag `ForceStand` (see locomotionTransitions CrouchDecisions):
# while V has a ForceStand-tagged effect, crouch is blocked and an already-crouched
# V transitions back up. The game ships `GameplayRestriction.ForceCrouch` (the exact
# counterpart) but no confirmed stock `ForceStand` record, so we clone ForceCrouch
# and swap the tag. init.lua applies GameplayRestriction.JLForceStand at the finale
# (blazeForceStand) and removes it when the conversation ends (blazeReleaseStand).
# ---------------------------------------------------------------------------
GameplayRestriction.JLForceStand:
  $base: GameplayRestriction.ForceCrouch   # proven counterpart record
  gameplayTags:
    - ForceStand                            # swap ForceCrouch -> ForceStand
